openapi: 3.0.3
info:
  title: PlanRun API
  description: |
    API приложения PlanRun. Все операции вызываются через один endpoint с query-параметром `action`.
    Авторизация: веб — cookies (сессия), мобильное приложение — Bearer JWT (Authorization).
  version: 1.0.0

servers:
  - url: /api
    description: Relative (same origin)
  - url: http://localhost/api
    description: Local dev

paths:
  /api_wrapper.php:
    get:
      summary: GET-операции
      description: Передайте нужный action в query. Параметры — в query string.
      operationId: apiGet
      tags: [api]
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - get_site_settings
              - check_auth
              - load
              - check_plan_status
              - clear_plan_generation_message
              - get_day
              - get_result
              - get_all_results
              - get_workout_timeline
              - stats
              - get_all_workouts_summary
              - get_all_workouts_list
              - prepare_weekly_analysis
              - list_exercise_library
              - get_profile
              - get_user_by_slug
              - get_csrf_token
              - notifications_dismissed
              - admin_list_users
              - admin_get_user
              - admin_get_settings
              - chat_get_messages
              - chat_admin_chat_users
              - chat_admin_unread_notifications
              - chat_admin_get_messages
              - run_weekly_adaptation
          description: Имя действия (см. полный список в описании)
      responses:
        '200':
          description: Успех (тело зависит от action)
        '401':
          description: Требуется авторизация
        '404':
          description: Действие не найдено

    post:
      summary: POST-операции
      description: action в query, тело запроса — JSON для операций, которые его принимают.
      operationId: apiPost
      tags: [api]
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - login
              - logout
              - refresh_token
              - save
              - save_result
              - reset
              - delete_workout
              - add_week
              - delete_week
              - add_training_day
              - add_training_day_by_date
              - update_training_day
              - delete_training_day
              - add_day_exercise
              - update_day_exercise
              - delete_day_exercise
              - reorder_day_exercises
              - regenerate_plan_with_progress
              - recalculate_plan
              - generate_next_plan
              - reactivate_plan
              - clear_plan_generation_message
              - update_profile
              - delete_user
              - upload_avatar
              - remove_avatar
              - update_privacy
              - notifications_dismiss
              - unlink_telegram
              - request_password_reset
              - confirm_password_reset
              - admin_update_user
              - admin_update_settings
              - chat_send_message
              - chat_send_message_stream
              - chat_clear_ai
              - chat_mark_read
              - chat_mark_all_read
              - chat_send_message_to_admin
              - chat_admin_send_message
              - chat_admin_mark_all_read
              - chat_admin_mark_conversation_read
              - chat_add_ai_message
              - chat_admin_broadcast
          description: Имя действия
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Зависит от action (см. ApiClient.js и контроллеры)
      responses:
        '200':
          description: Успех
        '401':
          description: Требуется авторизация
        '404':
          description: Действие не найдено

  /register_api.php:
    get:
      summary: Валидация полей регистрации
      description: Legacy endpoint регистрации. Сейчас используется для live-валидации `username` и `email`.
      operationId: registerValidateField
      tags: [registration]
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [validate_field]
        - name: field
          in: query
          required: true
          schema:
            type: string
            enum: [username, email]
        - name: value
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Результат валидации
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  message:
                    type: string

    post:
      summary: Регистрация и email verification
      description: |
        Используется для отправки email-кода, минимальной регистрации и полной регистрации.
        Тип операции определяется телом запроса.
      operationId: registerWorkflow
      tags: [registration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [action, email]
                  properties:
                    action:
                      type: string
                      enum: [send_verification_code]
                    email:
                      type: string
                      format: email
                - type: object
                  required: [register_minimal, username, email, password, verification_code]
                  properties:
                    register_minimal:
                      type: boolean
                      enum: [true]
                    username:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    verification_code:
                      type: string
                - type: object
                  required: [username, email, password]
                  properties:
                    username:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    verification_code:
                      type: string
                    goal_type:
                      type: string
                      enum: [health, race, weight_loss, time_improvement]
                    race_date:
                      type: string
                      format: date
                    race_distance:
                      type: string
                    training_mode:
                      type: string
                      enum: [ai, coach, both]
            examples:
              sendCode:
                value:
                  action: send_verification_code
                  email: athlete@example.com
              registerMinimal:
                value:
                  register_minimal: true
                  username: runner
                  email: runner@example.com
                  password: strong-password
                  verification_code: "123456"
      responses:
        '200':
          description: Успех
        '400':
          description: Ошибка валидации
        '429':
          description: Сработал rate limit
        '500':
          description: Внутренняя ошибка

  /complete_specialization_api.php:
    post:
      summary: Завершение onboarding и запуск генерации плана
      description: |
        Сохраняет специализацию/цели после минимальной регистрации и ставит AI-генерацию плана в очередь.
      operationId: completeSpecialization
      tags: [registration, plan]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                goal_type:
                  type: string
                  enum: [health, race, weight_loss, time_improvement]
                race_date:
                  type: string
                  format: date
                race_distance:
                  type: string
                training_mode:
                  type: string
                  enum: [ai, coach, both]
      responses:
        '200':
          description: Специализация сохранена, генерация плана запущена
        '400':
          description: Ошибка валидации
        '401':
          description: Требуется авторизация
        '500':
          description: Внутренняя ошибка

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: Сессия (веб)
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT (мобильное приложение)

security: []
# Для операций с авторизацией используется либо sessionCookie, либо bearerAuth (зависит от клиента)
