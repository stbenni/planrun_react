<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="planRUN" />
    <meta name="theme-color" content="#FFFFFF" id="theme-color-meta" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>planRUN - Календарь тренировок</title>
    <!-- Telegram Mini App SDK: async, чтобы не блокировать обычную веб-загрузку. -->
    <script async src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function() {
        function getSystemTheme() {
          return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        // Тема клиента Telegram (может отличаться от темы ОС). До загрузки SDK
        // берём из URL-хэша — Telegram кладёт туда tgWebAppThemeParams; после —
        // из window.Telegram.WebApp.colorScheme. null, если мы не в Telegram.
        function getTelegramTheme() {
          try {
            var live = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.colorScheme;
            if (live === 'dark' || live === 'light') return live;
          } catch (e) { /* SDK ещё не готов */ }
          try {
            var src = window.location.hash || window.location.search || '';
            var m = src.match(/tgWebAppThemeParams=([^&]+)/);
            if (!m) return null;
            var bg = JSON.parse(decodeURIComponent(m[1])).bg_color;
            if (!bg) return null;
            var hex = String(bg).replace('#', '');
            if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            var r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
            if (isNaN(r) || isNaN(g) || isNaN(b)) return null;
            return (0.299*r + 0.587*g + 0.114*b) / 255 < 0.5 ? 'dark' : 'light';
          } catch (e) { return null; }
        }
        function getTheme() {
          var saved = localStorage.getItem('theme');
          if (saved === 'dark' || saved === 'light') return saved;
          return getTelegramTheme() || getSystemTheme();
        }
        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          if (document.body) document.body.setAttribute('data-theme', theme);
          var meta = document.getElementById('theme-color-meta');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#1A1A1A' : '#FFFFFF');
          var manifest = document.querySelector('link[rel="manifest"]');
          if (!manifest) {
            manifest = document.createElement('link');
            manifest.rel = 'manifest';
            document.head.appendChild(manifest);
          }
          manifest.href = theme === 'dark' ? '/site.webmanifest.dark' : '/site.webmanifest';
        }
        applyTheme(getTheme());
        document.addEventListener('DOMContentLoaded', function() {
          if (document.body) document.body.setAttribute('data-theme', getTheme());
        });
        var m = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
        if (m && m.addEventListener) {
          m.addEventListener('change', function() {
            if (localStorage.getItem('theme') !== 'dark' && localStorage.getItem('theme') !== 'light') {
              applyTheme(getTheme());
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
