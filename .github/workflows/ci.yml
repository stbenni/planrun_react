name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: planrun-backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run backend targeted unit tests
        run: php ./vendor/bin/phpunit --do-not-cache-result tests/Unit/RegistrationServiceTest.php tests/Unit/PlanGenerationQueueServiceTest.php
