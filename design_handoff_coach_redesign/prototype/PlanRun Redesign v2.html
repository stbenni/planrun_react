<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>PlanRun · редизайн v2</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  @font-face { font-family: 'Montserrat'; font-style: normal; font-weight: 400; src: url('fonts/montserrat-400.woff2') format('woff2'); font-display: swap; }
  @font-face { font-family: 'Montserrat'; font-style: normal; font-weight: 500; src: url('fonts/montserrat-500.woff2') format('woff2'); font-display: swap; }
  @font-face { font-family: 'Montserrat'; font-style: normal; font-weight: 600; src: url('fonts/montserrat-600.woff2') format('woff2'); font-display: swap; }
  @font-face { font-family: 'Montserrat'; font-style: normal; font-weight: 700; src: url('fonts/montserrat-700.woff2') format('woff2'); font-display: swap; }
  @font-face { font-family: 'Montserrat'; font-style: normal; font-weight: 800; src: url('fonts/montserrat-800.woff2') format('woff2'); font-display: swap; }
  @font-face { font-family: 'Jost'; font-style: normal; font-weight: 400; src: url('fonts/jost-latin.woff2') format('woff2'), url('fonts/jost-cyrillic.woff2') format('woff2'); font-display: swap; }
  @font-face { font-family: 'Jost'; font-style: normal; font-weight: 600; src: url('fonts/jost-latin.woff2') format('woff2'), url('fonts/jost-cyrillic.woff2') format('woff2'); font-display: swap; }
  @font-face { font-family: 'Jost'; font-style: normal; font-weight: 700; src: url('fonts/jost-latin.woff2') format('woff2'), url('fonts/jost-cyrillic.woff2') format('woff2'); font-display: swap; }
  @font-face { font-family: 'Jost'; font-style: normal; font-weight: 800; src: url('fonts/jost-latin.woff2') format('woff2'), url('fonts/jost-cyrillic.woff2') format('woff2'); font-display: swap; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Montserrat', -apple-system, system-ui, sans-serif; }
  body { background: #f0eee9; }
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/v2-shared.jsx"></script>
<script type="text/babel" src="src/v2-coach-desktop.jsx"></script>
<script type="text/babel" src="src/v2-athlete-mobile.jsx"></script>
<script type="text/babel" src="src/v2-coach-mobile.jsx"></script>
<script type="text/babel" src="src/design-canvas.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas
      title="PlanRun · редизайн v2 (один цельный)"
      subtitle="Тренер в фокусе · 3 режима работы (таблица/сетка/поток) · drill-in без потери контекста · bulk-операции · бегун получает чёткий «сегодня»-экран. Все артборды интерактивны."
    >
      <DCSection
        id="coach-desktop"
        title="Тренер · десктоп"
        subtitle="Главный экран. Кликни вкладки «Таблица / Сетка / Поток» наверху, фильтр групп, чекбоксы для bulk-select, клик по атлету — открывает drill-in оверлей. Кнопка «+ Назначить тренировку» — мастер из 3 шагов."
      >
        <DCArtboard id="cd-main" label="Главный · Таблица + фильтры + KPI" width={1440} height={900}>
          <CoachShell initialView="table" />
        </DCArtboard>

        <DCArtboard id="cd-drillin" label="Drill-in оверлей · Алексей Петров" width={1440} height={900}>
          <CoachShell initialView="table" initialOverlayId={1} />
        </DCArtboard>

        <DCArtboard id="cd-grid" label="Сетка · тепловая карта compliance" width={1440} height={900}>
          <CoachShell initialView="grid" />
        </DCArtboard>

        <DCArtboard id="cd-stream" label="Поток · события команды" width={1440} height={900}>
          <CoachShell initialView="stream" />
        </DCArtboard>

        <DCArtboard id="cd-bulk" label="Мастер «Назначить тренировку»" width={1440} height={900}>
          <CoachShell initialView="table" initialBulkOpen={true} />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="athlete-mobile"
        title="Бегун · мобильный"
        subtitle="Фокус на «что у меня сегодня» в 2 секунды. Tabs Сегодня / Неделя / Цель / Прогресс. Внизу — Liquid-glass nav. Все табы интерактивны."
      >
        <DCArtboard id="am-app" label="Сегодня · план + AI-совет тренера" width={390} height={844}>
          <AthleteMobile />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="coach-mobile"
        title="Тренер · мобильный"
        subtitle="На ходу. Открывается на «Потоке». Тап по событию → bottom-sheet с быстрыми ответами и действиями, не уходя из ленты."
      >
        <DCArtboard id="cm-app" label="Поток · события + быстрые ответы" width={390} height={844}>
          <CoachMobile />
        </DCArtboard>
      </DCSection>

      <DCPostIt x={32} y={32} w={240}>
        Один cohesive редизайн, не выбор из трёх.
        {'\n\n'}Слева → вправо: рабочий стол тренера в 3 режимах, drill-in оверлей, мастер назначения.
        {'\n\n'}Дальше — мобильный бегуна и мобильный тренера.
        {'\n\n'}Все нажимные элементы работают: вкладки, фильтры, чекбоксы, expand/collapse.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
